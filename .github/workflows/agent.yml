name: GrowVault AI Agent

on:
  schedule:
    - cron: "*/30 * * * *"  # runs every 30 minutes
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run agent cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          FRONTEND_URL: https://grow-vault-taum.vercel.app
        run: npx tsx index.ts --once
